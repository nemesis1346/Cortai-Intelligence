version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: cortai-pm-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../../cortai-pm.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:16-alpine
    container_name: cortai-pm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cortai_pm
      POSTGRES_USER: cortai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changethis}
    volumes:
      - cortai-pm-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cortai-pm-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cortai:${DB_PASSWORD:-changethis}@db:5432/cortai_pm
      BUILDIUM_CLIENT_ID: ${BUILDIUM_CLIENT_ID:-}
      BUILDIUM_CLIENT_SECRET: ${BUILDIUM_CLIENT_SECRET:-}
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app/api
      - ./buildium:/app/buildium
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cortai-pm-data:
    driver: local
